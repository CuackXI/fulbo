{% extends 'layouts/base.html' %}

{% block content %}

{% load static %}

<h2>Parsed request</h2>
<p>Title: {{ title }}</p>
<p>Price: ${{ price }}</p>
<p>Description: {{ description }}</p>
<p>Category: {{ category }}</p>
<img class="" src="{{ image }}" alt="Product image">
<h3>Rating</h3>
<ul>
    <li><p>Rate: {{ rating_rate }}/5</p></li>
    <li><p>Votes: {{ rating_count }}</p></li>
</ul>

{% endblock %}
